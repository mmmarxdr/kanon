name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kanon
          POSTGRES_PASSWORD: kanon
          POSTGRES_DB: kanon_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanon"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kanon:kanon@localhost:5432/kanon_e2e?schema=public
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      NODE_ENV: test
      PORT: "3001"
      SKIP_DND: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @kanon/api db:generate

      - name: Run database migrations
        run: pnpm --filter @kanon/api exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter @kanon/api db:seed
        env:
          PRISMA_USER_CONSENT_FOR_DANGEROUS_AI_ACTION: "true"

      - name: TypeScript check (API)
        run: pnpm --filter @kanon/api exec tsc --noEmit

      - name: TypeScript check (Web)
        run: pnpm --filter @kanon/web typecheck

      - name: TypeScript check (E2E)
        run: cd packages/e2e && npx tsc --noEmit

      - name: Run API tests (Vitest)
        run: pnpm --filter @kanon/api test

      - name: Run Web tests (Vitest)
        run: pnpm --filter @kanon/web test

      - name: Install Playwright browsers
        run: pnpm --filter @kanon/e2e exec playwright install chromium --with-deps

      - name: Run E2E tests (Playwright)
        run: pnpm --filter @kanon/e2e test
        env:
          CI: true
          API_PORT: "3001"
          WEB_PORT: "5174"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: packages/e2e/test-results/
          retention-days: 14
